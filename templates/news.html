<!DOCTYPE html>
<html>
    <head>
        <title>Hacker News</title>
    </head>
    <body>
        <h1>Hacker News</h1>

        <ul>
            {% for news in news_list %}
                <li>
                    <a href="{{ news.url }}" target="_blank">
                        {{ news.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </body>
</html>
